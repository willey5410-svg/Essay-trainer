<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>英検1級 Essay Trainer</title>
<link rel="stylesheet" href="css/style.css?v=18">
<script>
  // 描画前にテーマを適用してちらつきを防ぐ
  (function () {
    try {
      var t = localStorage.getItem('et.theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept="application/json" hidden>
<!-- ?v= はキャッシュバスター。テンプレート構造を変えるデプロイでは番号を上げること -->
<script src="js/templates.js?v=18"></script>
<script src="js/presets.js?v=18"></script>
<script src="js/gemini.js?v=18"></script>
<script src="js/app.js?v=18"></script>
</body>
</html>
